name: Verityn Cron Jobs

on:
  schedule:
    # Cache warming — runs at 5am UTC every day
    # (10:30am IST, 1am EST, 6am BST)
    - cron: '0 5 * * *'

    # Story follow checks — runs every 30 minutes
    - cron: '*/30 * * * *'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run (leave empty for auto)'
        required: false
        default: ''

jobs:
  run-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger Verityn cron endpoint
        run: |
          echo "Triggering cron at $(date -u)"

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "https://verityn-backend-ten.vercel.app/api/cron")

          echo "Response status: $RESPONSE"

          if [ "$RESPONSE" = "200" ]; then
            echo "Cron completed successfully"
          else
            echo "Cron returned status $RESPONSE"
            exit 1
          fi
