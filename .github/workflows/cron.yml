name: Verityn Cron Jobs

on:
  schedule:
    # Every 3 hours — handles thread generation + daily summary
    - cron: '0 */3 * * *'

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  run-cron:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger Verityn cron endpoint
        run: |
          echo "Triggering cron at $(date -u)"

          RESPONSE=$(curl -s -o /tmp/cron_response.json -w "%{http_code}" \
            -X GET \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            "https://verityn-backend-ten.vercel.app/api/cron")

          echo "Response status: $RESPONSE"
          cat /tmp/cron_response.json

          if [ "$RESPONSE" = "200" ]; then
            echo "Cron completed successfully"
          else
            echo "Cron returned status $RESPONSE"
            exit 1
          fi
