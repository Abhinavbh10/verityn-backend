<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Verityn · Daily Brief</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body {
    background: #0A0A0C;
    color: #F5F0E8;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  .header {
    padding: 52px 24px 24px;
    border-bottom: 1px solid rgba(245,240,232,0.08);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-v {
    width: 28px;
    height: 28px;
    background: #C0392B;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Georgia, serif;
    font-size: 16px;
    color: #F5F0E8;
    border-radius: 4px;
  }

  .logo-text {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: #F5F0E8;
    text-transform: uppercase;
  }

  .date {
    font-size: 11px;
    color: rgba(245,240,232,0.35);
    letter-spacing: 0.05em;
    font-family: 'SF Mono', monospace;
  }

  .generate-btn {
    margin: 24px;
    width: calc(100% - 48px);
    padding: 18px;
    background: #C0392B;
    color: #F5F0E8;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.02em;
    cursor: pointer;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .generate-btn:active { opacity: 0.75; }
  .generate-btn:disabled { opacity: 0.4; }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(245,240,232,0.3);
    border-top-color: #F5F0E8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .status {
    text-align: center;
    font-size: 13px;
    color: rgba(245,240,232,0.4);
    padding: 0 24px 16px;
    min-height: 24px;
    font-family: 'SF Mono', monospace;
  }

  .content { display: none; }

  /* Card */
  .card-section {
    padding: 0 24px 8px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(245,240,232,0.35);
    text-transform: uppercase;
    margin-bottom: 12px;
    font-family: 'SF Mono', monospace;
  }

  #card-preview {
    background: #0D0D0F;
    border-left: 3px solid #C0392B;
    border-radius: 4px;
    padding: 28px 24px;
    margin-bottom: 12px;
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .card-logo {
    font-family: 'SF Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: #F5F0E8;
    text-transform: uppercase;
  }

  .card-date {
    font-family: 'SF Mono', monospace;
    font-size: 10px;
    color: rgba(245,240,232,0.3);
  }

  .card-rotation {
    text-align: center;
    font-family: 'SF Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    color: rgba(245,240,232,0.3);
    text-transform: uppercase;
    border-top: 1px solid rgba(245,240,232,0.07);
    border-bottom: 1px solid rgba(245,240,232,0.07);
    padding: 8px 0;
    margin-bottom: 16px;
  }

  .card-mood {
    font-family: Georgia, serif;
    font-size: 13px;
    font-style: italic;
    color: #F5F0E8;
    line-height: 1.5;
    margin-bottom: 16px;
  }

  .card-divider {
    height: 1px;
    background: rgba(245,240,232,0.07);
    margin-bottom: 14px;
  }

  .card-story {
    display: flex;
    gap: 12px;
    margin-bottom: 10px;
    align-items: baseline;
  }

  .card-num {
    font-family: 'SF Mono', monospace;
    font-size: 9px;
    color: #C0392B;
    min-width: 20px;
    flex-shrink: 0;
  }

  .card-headline {
    font-size: 12px;
    color: rgba(245,240,232,0.8);
    line-height: 1.4;
  }

  .card-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid rgba(245,240,232,0.07);
  }

  .card-footer-url {
    font-family: 'SF Mono', monospace;
    font-size: 9px;
    color: rgba(245,240,232,0.2);
  }

  .card-footer-tag {
    font-family: Georgia, serif;
    font-size: 10px;
    font-style: italic;
    color: rgba(245,240,232,0.15);
  }

  .download-btn {
    width: 100%;
    padding: 14px;
    background: rgba(192,57,43,0.15);
    color: #C0392B;
    border: 1px solid rgba(192,57,43,0.3);
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 24px;
  }

  .download-btn:active { background: rgba(192,57,43,0.25); }

  /* Content blocks */
  .block {
    margin: 0 24px 20px;
  }

  .block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .block-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(245,240,232,0.35);
    text-transform: uppercase;
    font-family: 'SF Mono', monospace;
  }

  .copy-btn {
    font-size: 12px;
    color: #C0392B;
    background: none;
    border: none;
    cursor: pointer;
    font-weight: 500;
    padding: 4px 0;
  }

  .copy-btn.copied { color: #27AE60; }

  .block-content {
    background: #111114;
    border-left: 2px solid #C0392B;
    border-radius: 0 8px 8px 0;
    padding: 16px;
    font-size: 14px;
    line-height: 1.65;
    color: rgba(245,240,232,0.85);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .hook-content {
    background: #111114;
    border-left: 2px solid #C0392B;
    border-radius: 0 8px 8px 0;
    padding: 16px;
    font-size: 17px;
    font-weight: 600;
    line-height: 1.4;
    color: #F5F0E8;
  }

  .hashtags-content {
    background: #111114;
    border-left: 2px solid rgba(192,57,43,0.4);
    border-radius: 0 8px 8px 0;
    padding: 16px;
    font-size: 13px;
    color: rgba(245,240,232,0.6);
    line-height: 1.8;
    word-break: break-word;
  }

  .divider-line {
    height: 1px;
    background: rgba(245,240,232,0.06);
    margin: 8px 24px 28px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-v">V</div>
    <div class="logo-text">Daily Brief</div>
  </div>
  <div class="date" id="today-date"></div>
</div>

<button class="generate-btn" id="gen-btn" onclick="generate()">
  <div class="spinner" id="spinner"></div>
  <span id="btn-text">Generate Today's Content</span>
</button>

<div class="status" id="status"></div>

<div class="content" id="content">

  <!-- Card -->
  <div class="card-section">
    <div class="section-label">📸 Instagram Card — Screenshot & Post</div>
    <div id="card-preview">
      <div class="card-header">
        <div class="card-logo">V · Verityn Daily Brief</div>
        <div class="card-date" id="c-date"></div>
      </div>
      <div class="card-rotation" id="c-rotation"></div>
      <div class="card-mood" id="c-mood"></div>
      <div class="card-divider"></div>
      <div id="c-stories"></div>
      <div class="card-footer">
        <div class="card-footer-url">verityn.news</div>
        <div class="card-footer-tag">7 stories. Why they matter to you.</div>
      </div>
    </div>
    <button class="download-btn" onclick="downloadCard()">⬇ Download Card as PNG</button>
  </div>

  <!-- Hook -->
  <div class="block">
    <div class="block-header">
      <div class="block-label">🪝 Hook — First Line</div>
      <button class="copy-btn" onclick="copyText('hook-text', this)">Copy</button>
    </div>
    <div class="hook-content" id="hook-text"></div>
  </div>

  <div class="divider-line"></div>

  <!-- Instagram Caption -->
  <div class="block">
    <div class="block-header">
      <div class="block-label">📝 Instagram Caption</div>
      <button class="copy-btn" onclick="copyText('instagram-text', this)">Copy</button>
    </div>
    <div class="block-content" id="instagram-text"></div>
  </div>

  <!-- Hashtags -->
  <div class="block">
    <div class="block-header">
      <div class="block-label"># Hashtags</div>
      <button class="copy-btn" onclick="copyText('hashtags-text', this)">Copy</button>
    </div>
    <div class="hashtags-content" id="hashtags-text"></div>
  </div>

  <div class="divider-line"></div>

  <!-- LinkedIn -->
  <div class="block">
    <div class="block-header">
      <div class="block-label">💼 LinkedIn Post</div>
      <button class="copy-btn" onclick="copyText('linkedin-text', this)">Copy</button>
    </div>
    <div class="block-content" id="linkedin-text"></div>
  </div>

  <div class="divider-line"></div>

  <!-- Twitter -->
  <div class="block">
    <div class="block-header">
      <div class="block-label">🐦 Twitter Thread</div>
      <button class="copy-btn" onclick="copyText('twitter-text', this)">Copy</button>
    </div>
    <div class="block-content" id="twitter-text"></div>
  </div>

</div>

<script>
  // Set today's date
  const today = new Date();
  const dateStr = today.toLocaleDateString('en-GB', {day:'2-digit',month:'2-digit',year:'2-digit'}).replace(/\//g,'.');
  document.getElementById('today-date').textContent = dateStr;

  async function generate() {
    const btn = document.getElementById('gen-btn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btn-text');
    const status = document.getElementById('status');

    btn.disabled = true;
    spinner.style.display = 'block';
    btnText.textContent = 'Generating...';
    status.textContent = 'Fetching today\'s news...';

    try {
      status.textContent = 'Fetching news & generating briefing...';
      const res = await fetch('/api/marketing?action=generate');
      
      status.textContent = 'Writing content...';
      const json = await res.json();

      if (!json.success) throw new Error(json.error);

      const d = json.data;

      // Fill card
      document.getElementById('c-date').textContent = d.date;
      document.getElementById('c-rotation').textContent = 
        d.rotation.countries.join(' + ') + '  ·  ' + d.rotation.interests.join(' + ');
      document.getElementById('c-mood').textContent = '"' + d.mood + '"';
      
      document.getElementById('c-stories').innerHTML = d.stories.map((h, i) =>
        `<div class="card-story">
          <div class="card-num">0${i+1}</div>
          <div class="card-headline">${h}</div>
        </div>`
      ).join('');

      // Fill content
      document.getElementById('hook-text').textContent = d.hook;
      document.getElementById('instagram-text').textContent = d.instagramBody;
      document.getElementById('hashtags-text').textContent = d.hashtags;
      document.getElementById('linkedin-text').textContent = d.linkedin;
      document.getElementById('twitter-text').textContent = d.twitter;

      // Show content
      document.getElementById('content').style.display = 'block';
      status.textContent = '';

    } catch (err) {
      status.textContent = 'Error: ' + err.message;
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
      btnText.textContent = 'Regenerate';
    }
  }

  async function downloadCard() {
    const card = document.getElementById('card-preview');
    const canvas = await html2canvas(card, {
      backgroundColor: '#0D0D0F',
      scale: 3,
      useCORS: true,
      logging: false
    });
    const link = document.createElement('a');
    link.download = 'verityn-brief-' + dateStr + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  function copyText(id, btn) {
    const text = document.getElementById(id).textContent;
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = 'Copied ✓';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2000);
    });
  }
</script>
</body>
</html>
